<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - IP Subnetting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .loader { border: 4px solid #334155; border-top: 4px solid #10b981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-in { animation: fadeInScale 0.4s ease-out forwards; }
        /* สกอร์บาร์ตกแต่ง */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

    <div id="loadingOverlay" class="absolute inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p class="text-slate-400 font-medium">กำลังเชื่อมต่อระบบฐานข้อมูล...</p>
    </div>

    <div id="screenTeacherLogin" class="max-w-md w-full bg-slate-800 rounded-2xl shadow-2xl p-8 text-center hidden border border-slate-700 animate-fade-in relative">
        <div class="w-20 h-20 bg-emerald-600/20 text-emerald-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 mt-4">
            <i class="fa-solid fa-lock"></i>
        </div>
        <h2 class="text-2xl font-bold mb-2">เข้าสู่ระบบอาจารย์</h2>
        <p class="text-slate-400 mb-6 text-sm">กรุณากรอกข้อมูลเพื่อเข้าดูคะแนนของนักศึกษา</p>

        <div class="space-y-4 mb-6 text-left">
            <div>
                <label class="block text-slate-300 text-sm font-bold mb-2">อีเมลผู้ใช้งาน</label>
                <input type="email" id="teacherEmailInput" placeholder="email@example.com" class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-600 text-white focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500">
            </div>
            <div>
                <label class="block text-slate-300 text-sm font-bold mb-2">รหัสผ่าน</label>
                <input type="password" id="teacherPasswordInput" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-600 text-white focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500">
            </div>
            <p id="teacherLoginError" class="text-red-400 text-sm hidden text-center mt-2 font-medium"><i class="fa-solid fa-circle-exclamation"></i> อีเมลหรือรหัสผ่านไม่ถูกต้อง!</p>
        </div>
        <button id="btnLogin" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition shadow-lg">
            เข้าสู่ระบบ
        </button>
    </div>

    <div id="screenTeacher" class="max-w-5xl w-full bg-slate-800 rounded-2xl shadow-2xl p-6 md:p-8 hidden border border-slate-700 animate-fade-in flex flex-col h-[90vh]">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-2xl font-bold text-white flex items-center gap-2">
                    <i class="fa-solid fa-chalkboard-user text-emerald-400"></i> กระดานคะแนนนักศึกษา
                </h2>
                <p class="text-slate-400 text-sm">ข้อมูลอัปเดตแบบเรียลไทม์ (Real-time)</p>
            </div>
            <button onclick="location.reload()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg transition text-sm">
                <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
            </button>
        </div>

        <div class="bg-slate-900 rounded-xl border border-slate-700 overflow-hidden flex-grow overflow-y-auto relative">
            <table class="w-full text-left text-sm text-slate-300">
                <thead class="text-xs text-slate-400 uppercase bg-slate-800/50 sticky top-0 z-10">
                    <tr>
                        <th class="px-6 py-4">ลำดับ</th>
                        <th class="px-6 py-4">ข้อมูลนักศึกษา</th>
                        <th class="px-6 py-4 text-center">คะแนนที่ได้</th>
                        <th class="px-6 py-4">ส่งเมื่อ (เวลา)</th>
                        <th class="px-6 py-4 text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody" class="divide-y divide-slate-700"></tbody>
            </table>
            
            <div id="emptyBoard" class="hidden absolute inset-0 flex flex-col items-center justify-center text-slate-500">
                <i class="fa-solid fa-folder-open text-4xl mb-3 opacity-50"></i>
                <p>ยังไม่มีนักศึกษาส่งคะแนน</p>
            </div>
        </div>
    </div>

    <div id="detailsModal" class="absolute inset-0 bg-slate-900/90 backdrop-blur-sm z-50 hidden flex flex-col items-center justify-center p-4">
        <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-600 max-w-2xl w-full flex flex-col max-h-[85vh] animate-fade-in">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800 rounded-t-2xl">
                <div>
                    <h3 class="text-xl font-bold text-white mb-1"><i class="fa-solid fa-magnifying-glass-chart text-blue-400 mr-2"></i> รายละเอียดการตรวจคำตอบ</h3>
                    <p class="text-slate-400 text-sm" id="modalStudentName"></p>
                </div>
                <button id="btnCloseModal" class="text-slate-400 hover:text-white transition p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-grow space-y-6" id="modalHistoryContent">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0K8Q5lbxbETBEDaPLp_IGea7Ly1QfEfE",
            authDomain: "ipcalculatetest.firebaseapp.com",
            projectId: "ipcalculatetest",
            storageBucket: "ipcalculatetest.firebasestorage.app",
            messagingSenderId: "760594946539",
            appId: "1:760594946539:web:9e6fed2b0f540e7285a1ae"
        };
        
        const appId = 'subnet-quiz-app';
        let app, auth, db, currentUser = null;
        
        // ตัวแปรเก็บข้อมูลเด็กทั้งหมดไว้ใช้เปิดดูรายละเอียด
        window.globalScoreData = {};

        // Mapping ชื่อช่อง
        const fieldNames = {
            'mask': 'Subnet Mask',
            'network': 'Network ID',
            'broadcast': 'Broadcast Address',
            'first': 'First Usable Host',
            'last': 'Last Usable Host'
        };

        try { app = initializeApp(firebaseConfig); auth = getAuth(app); db = getFirestore(app); } catch (e) { console.error(e); }

        if (auth) {
            signInAnonymously(auth).catch(e => console.error("Auth Error:", e));
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('screenTeacherLogin').classList.remove('hidden');
            });
        }

        document.getElementById('btnLogin').addEventListener('click', () => {
            const email = document.getElementById('teacherEmailInput').value.trim();
            const password = document.getElementById('teacherPasswordInput').value;

            if (email === "beam1136@hotmail.com" && password === "10072542@Passw0rd") {
                document.getElementById('screenTeacherLogin').classList.add('hidden');
                document.getElementById('screenTeacher').classList.remove('hidden');
                loadScores();
            } else {
                document.getElementById('teacherLoginError').classList.remove('hidden');
            }
        });

        function loadScores() {
            if (!currentUser || !db) return;
            const scoresRef = collection(db, 'artifacts', appId, 'public', 'data', 'subnet_scores');
            
            onSnapshot(scoresRef, (snapshot) => {
                const scoresList = [];
                window.globalScoreData = {}; // Clear old data

                snapshot.forEach((docSnap) => { 
                    const data = docSnap.data();
                    scoresList.push({ id: docSnap.id, ...data }); 
                    window.globalScoreData[docSnap.id] = data; // บันทึกเก็บไว้เพื่อเปิด Modal
                });
                scoresList.sort((a, b) => b.timestamp - a.timestamp); 
                renderLeaderboard(scoresList);
            }, (error) => { console.error("Error fetching scores:", error); });
        }

        function renderLeaderboard(scores) {
            const tbody = document.getElementById('leaderboardBody');
            const emptyBoard = document.getElementById('emptyBoard');
            
            if (scores.length === 0) {
                tbody.innerHTML = ""; emptyBoard.classList.remove('hidden'); return;
            }

            emptyBoard.classList.add('hidden');
            tbody.innerHTML = "";

            scores.forEach((entry, index) => {
                const date = new Date(entry.timestamp);
                const timeString = `${date.toLocaleDateString('th-TH')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')} น.`;
                const percentage = (entry.score / entry.maxScore) * 100;
                let scoreColor = "text-red-400";
                if (percentage >= 80) scoreColor = "text-emerald-400 font-bold";
                else if (percentage >= 50) scoreColor = "text-yellow-400";

                const row = `
                    <tr class="hover:bg-slate-800/50 transition border-b border-slate-700/50">
                        <td class="px-6 py-4 font-medium">${index + 1}</td>
                        <td class="px-6 py-4 text-white font-medium">${entry.studentName}</td>
                        <td class="px-6 py-4 text-center ${scoreColor}">${entry.score} / ${entry.maxScore}</td>
                        <td class="px-6 py-4 text-xs text-slate-500">${timeString}</td>
                        <td class="px-6 py-4 text-center space-x-2">
                            <button onclick="viewDetails('${entry.id}')" class="bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white px-3 py-1.5 rounded transition text-sm" title="ดูข้อผิด">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </button>
                            <button onclick="deleteScore('${entry.id}')" class="bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white px-3 py-1.5 rounded transition text-sm" title="ลบข้อมูล">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        // --- ฟังก์ชันทำงานของปุ่ม จัดการ ---
        window.deleteScore = async function(docId) {
            if (confirm("⚠️ แน่ใจหรือไม่ที่จะลบคะแนนของนักศึกษาคนนี้?\nการลบจะไม่สามารถกู้คืนได้")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'subnet_scores', docId));
                } catch (error) {
                    console.error("Error deleting document: ", error);
                    alert("ไม่สามารถลบข้อมูลได้ กรุณาตรวจสอบสิทธิ์ Firebase Rules ให้เปิด allow delete: if true;");
                }
            }
        }

        window.viewDetails = function(docId) {
            const data = window.globalScoreData[docId];
            if (!data) return;

            document.getElementById('modalStudentName').textContent = data.studentName;
            const contentDiv = document.getElementById('modalHistoryContent');
            contentDiv.innerHTML = '';

            if (!data.history || data.history.length === 0) {
                contentDiv.innerHTML = `<div class="text-center text-slate-500 py-8">ไม่มีประวัติการตอบบันทึกไว้ในระบบ</div>`;
                document.getElementById('detailsModal').classList.remove('hidden');
                return;
            }

            // วนลูปวาดกล่องคำตอบของแต่ละข้อ
            data.history.forEach(round => {
                let html = `
                    <div class="bg-slate-900 border border-slate-700 rounded-xl p-5 relative overflow-hidden">
                        <div class="absolute top-0 right-0 bg-slate-800 px-3 py-1 text-xs text-slate-400 rounded-bl-lg font-bold border-b border-l border-slate-700">ข้อที่ ${round.round}</div>
                        <p class="text-slate-400 text-sm mb-1 uppercase tracking-wider">โจทย์</p>
                        <h4 class="text-2xl font-bold text-white mb-4 tracking-wider">${round.question}</h4>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                `;

                round.details.forEach(field => {
                    const isCorrect = field.isCorrect;
                    const icon = isCorrect ? '<i class="fa-solid fa-check text-emerald-500"></i>' : '<i class="fa-solid fa-xmark text-red-500"></i>';
                    const bgClass = isCorrect ? 'bg-emerald-500/10 border-emerald-500/30' : 'bg-red-500/10 border-red-500/30';
                    const correctAnsHtml = !isCorrect ? `<div class="text-xs text-emerald-400 mt-1">เฉลยที่ถูกต้อง: ${field.correctAnswer}</div>` : '';

                    html += `
                        <div class="border rounded-lg p-3 ${bgClass}">
                            <div class="text-xs text-slate-400 font-semibold mb-1">${fieldNames[field.fieldKey]}</div>
                            <div class="flex items-center gap-2">
                                ${icon} <span class="${isCorrect ? 'text-white' : 'text-red-300 line-through'}">${field.userAnswer}</span>
                            </div>
                            ${correctAnsHtml}
                        </div>
                    `;
                });

                html += `</div></div>`;
                contentDiv.insertAdjacentHTML('beforeend', html);
            });

            document.getElementById('detailsModal').classList.remove('hidden');
        }

        document.getElementById('btnCloseModal').addEventListener('click', () => {
            document.getElementById('detailsModal').classList.add('hidden');
        });
    </script>
</body>
</html>
